<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: linear-gradient(45deg , #433f3f, #22252a);
    }
    .calucater-body{
        width: 100%;
        max-width: 380px;
        background: transparent;
        border: 1px solid rgb(91, 79, 79);
        padding: 40px 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgb(10, 10, 10, 0.5);
    }
    .display{
        height: 60px;
      font-size: 30px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      margin-right: 20px;
      background-color: white;
      border: 2px solid rgb(183, 125, 125);
    }
    input {
        width: 320px;
        background: transparent;
        border: none;
        box-shadow: 0 0 10px rgba(84, 77, 84, 0.5);
        padding: 10px;
        margin: 10px;
        font-size: 25px;
        text-align: right;
        color: white;
    }
    button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin: 10px;
        border: none;
        background: transparent;
        color: white;
        box-shadow:  -8px -8px 20px rgba(113, 115, 119, 0.1);
    }
    @media (max-width:576px){
    body{
        height: 100vh;
        overflow: hidden;
    }
    input {margin-top: 50px;}
	.calucater-body{width: 100%;}
    button {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        margin: 5px;
        border: none;
        background: rgb(65, 60, 60);
        color: white;
        font-weight: 700;
        font-size: 24px;
        box-shadow:  -8px -8px 20px rgba(113, 115, 119, 0.1);
    }
    
}

</style>
  <body>
    <section class="calucater-body">
        <input type="text" placeholder="0" id="display">
        
        <div>
            <button onclick="clearDisplay()">AC</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="append('%')">%</button>
            <button onclick="append('/')">/</button>
        </div>
        <div>
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')">*</button>
        </div>
        <div>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')">-</button>
        </div>
        <div>
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')">+</button>
        </div>
        <div>
            <button onclick="append('00')">00</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate('')">=</button>
        </div>
    </section>

<script>
    function append(val) {
        document.getElementById('display').value += val;
    }
    function clearDisplay() {
        document.getElementById('display').value = '';
    }
     function deleteLast() {
        let current = document.getElementById('display').value;
        document.getElementById('display').value = current.slice(0, -1);
    }

    function calculate() {
    try {
        document.getElementById('display').value = eval(document.getElementById('display').value);
    } catch {
        document.getElementById('display').value = 'Error';
    }
    }
</script>
</body>
</html>
